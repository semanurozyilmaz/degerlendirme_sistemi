<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ödev Teslim Sistemi</title>
    <!-- Bootstrap 5 & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4cc9f0;
            --bg-light: #f8f9fa;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #2d3436;
        }

        .page-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 4rem 0;
            margin-bottom: -4rem;
            color: white;
            border-radius: 0 0 50px 50px;
        }

        .assignment-card {
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: var-card-shadow;
            overflow: hidden;
        }

        .assignment-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .card-badge {
            background: var(--primary-color);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .assignment-title {
            font-weight: 700;
            color: #1e293b;
            font-size: 1.25rem;
            line-height: 1.4;
        }

        .assignment-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #64748b;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .form-section {
            background: #f1f5f9;
            border-radius: 15px;
            padding: 1.5rem;
        }

        .input-group-text {
            background: white;
            border-right: none;
            color: #94a3b8;
        }

        .form-control {
            border-left: none;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            border-color: #e2e8f0;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--primary-color);
        }

        .btn-submit {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 0.8rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
        }

        .file-upload-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        .file-info-badge {
            font-size: 0.7rem;
            color: #ef4444;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="page-header text-center">
        <div class="container">
            <h1 class="display-5 fw-bold mb-2">Öğrenci Teslim Portalı</h1>
            <p class="opacity-75">Aktif ödevlerinizi seçin, kodunuzu yükleyin ve anında AI değerlendirmesini alın.</p>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row g-4">
            {% for odev in aktif_odevler %}
            <div class="col-md-6 col-xl-4">
                <div class="card assignment-card h-100">
                    <div class="p-4 flex-grow-1">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <span class="card-badge">{{ odev.baslik }}</span>
                            <small class="text-muted"><i class="far fa-clock me-1"></i>Aktif</small>
                        </div>

                        <h3 class="assignment-title mb-2">{{ odev.tanim }}</h3>

                        <div class="form-section">
                            <form action="/yukle" method="post" enctype="multipart/form-data">
                                <input type="hidden" name="odev_id" value="{{ odev.id }}">

                                <!-- İsim Girişi -->
                                <div class="input-group mb-2">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" name="ad" class="form-control" placeholder="Ad Soyad" required>
                                </div>

                                <!-- Numara Girişi -->
                                <div class="input-group mb-3">
                                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                    <input type="text" name="no" class="form-control" placeholder="Öğrenci Numarası"
                                        required>
                                </div>

                                <!-- Dosya Yükleme -->
                                <div class="file-upload-wrapper">
                                    <label class="form-label small fw-bold text-dark mb-1">Kaynak Kod Dosyası</label>
                                    <input type="file" name="dosya" class="form-control" accept=".c"
                                        style="border-left: 1px solid #e2e8f0;" required>
                                    <div class="file-info-badge">
                                        <i class="fas fa-info-circle"></i> Sadece .c uzantılı dosyalar desteklenir.
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary btn-submit w-100 mt-2">
                                    <i class="fas fa-paper-plane me-2"></i>Değerlendirmeye Gönder
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
