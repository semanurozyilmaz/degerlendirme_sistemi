<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ödev Teslim Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --bg-light: #f8f9fa;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            color: #2d3436;
        }

        .page-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 4rem 0;
            margin-bottom: -4rem;
            color: white;
            border-radius: 0 0 50px 50px;
        }

        .assignment-card {
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .assignment-card:hover {
            transform: translateY(-8px);
        }

        .form-section {
            background: #f1f5f9;
            border-radius: 15px;
            padding: 1.5rem;
        }

        .btn-submit {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 0.8rem;
            font-weight: 600;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <div class="page-header text-center">
        <div class="container">
            <h1 class="display-5 fw-bold mb-2">Öğrenci Teslim Portalı</h1>
        </div>
    </div>
    <div class="container pb-5">
        <div class="row g-4">
            {% for odev in aktif_odevler %}
            <div class="col-md-6 col-xl-4">
                <div class="card assignment-card h-100">
                    <div class="p-4 flex-grow-1">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <span class="badge bg-primary rounded-pill px-3">{{ odev.baslik }}</span>
                            <small class="text-muted"><i class="far fa-clock me-1"></i>Aktif</small>
                        </div>
                        <h3 class="fw-bold h5 mb-3">{{ odev.tanim }}</h3>
                        <div class="form-section">
                            <form action="/yukle" method="post" enctype="multipart/form-data">
                                <input type="hidden" name="odev_id" value="{{ odev.id }}">
                                <div class="input-group mb-2">
                                    <span class="input-group-text bg-white"><i
                                            class="fas fa-user text-muted"></i></span>
                                    <input type="text" name="ad" class="form-control" placeholder="Ad Soyad" required>
                                </div>
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white"><i
                                            class="fas fa-id-card text-muted"></i></span>
                                    <input type="text" name="no" class="form-control" placeholder="Öğrenci Numarası"
                                        required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Kaynak Kod (.c)</label>
                                    <input type="file" name="dosya" class="form-control" accept=".c" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-submit w-100">
                                    <i class="fas fa-paper-plane me-2"></i>Ödevi Teslim Et
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>

</html>
