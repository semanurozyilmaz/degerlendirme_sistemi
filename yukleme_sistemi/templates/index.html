<div class="container mt-5">
    <h2 class="mb-4 text-primary border-bottom pb-2">
        <i class="fas fa-book-open me-2"></i>Aktif Ödevler
    </h2>

    <div class="row">
        {% for odev in aktif_odevler %}
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="card h-100 shadow-sm border-0 rounded-3">
                <div class="card-header bg-dark text-white p-3">
                    <h5 class="card-title mb-0">{{ odev.baslik }}</h5>
                </div>
                <div class="card-body d-flex flex-column">
                    <p class="card-text text-muted flex-grow-1">
                        {{ odev.tanim }}
                    </p>

                    <hr class="my-3">

                    <form action="/yukle" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="odev_id" value="{{ odev.id }}">

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Öğrenci Bilgileri</label>
                            <input type="text" name="ad" class="form-control form-control-sm"
                                placeholder="Ad Soyad Giriniz" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Kaynak Kod (.c)</label>
                            <input type="file" name="dosya" class="form-control form-control-sm" accept=".c" required>
                            <div class="form-text" style="font-size: 0.75rem;">Sadece .c uzantılı dosyalar kabul edilir.
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-sm w-100 mt-2">
                            <i class="fas fa-upload me-1"></i>Ödevi Teslim Et
                        </button>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
