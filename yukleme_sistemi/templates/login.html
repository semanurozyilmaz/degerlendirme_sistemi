<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yetkili Girişi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <!-- Giriş Kartı -->
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 class="mb-0">Yetkili Girişi</h4>
                    </div>
                    <div class="card-body p-4">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }} small">{{ message }}</div>
                        {% endfor %}
                        {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Yetkili Şifresi</label>
                                <input type="password" name="sifre" class="form-control" placeholder="••••••" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">Giriş Yap</button>
                        </form>

                        <div class="text-center mt-4 border-top pt-3">
                            <a href="/" class="text-decoration-none text-secondary small d-block mb-2">
                                <i class="fas fa-arrow-left me-1"></i>Öğrenci Sayfasına Dön
                            </a>

                            <!-- Şifre Sıfırlama -->
                            <a href="/reset-password-to-default" class="text-danger small text-decoration-none"
                                style="font-size: 0.75rem; opacity: 0.8;"
                                onclick="return confirm('Şifre varsayılan olarak sıfırlanacak. Emin misiniz?')">
                                Şifremi Unuttum (Sıfırla)
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
