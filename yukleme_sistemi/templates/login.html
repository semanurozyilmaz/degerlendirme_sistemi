<!DOCTYPE html>
<html>

<head>
    <title>Yönetici Girişi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white text-center">
                        <h4>Yetkili Girişi</h4>
                    </div>
                    <div class="card-body p-4">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                        {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Yetkili Şifresi</label>
                                <input type="password" name="sifre" class="form-control" placeholder="••••••" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100">Giriş Yap</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="/" class="text-secondary small">Öğrenci Sayfasına Dön</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="login-footer" style="margin-top: 15px; display: block; clear: both;"></div>
    <a href="/reset-password-to-default" class="text-danger small"
        onclick="return confirm('Şifre varsayılana dönecek. Emin misiniz?')">
        Şifremi Unuttum (Sıfırla)
    </a>
    </div>
</body>

</html>
